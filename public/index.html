<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nocode Dashboard - API Example</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #6366f1;
        --primary-hover: #4f46e5;
        --bg: #0f172a;
        --sidebar-bg: #1e293b;
        --card-bg: #1e293b;
        --text-main: #f8fafc;
        --text-dim: #94a3b8;
        --border: #334155;
        --success: #22c55e;
        --danger: #ef4444;
        --glass: rgba(255, 255, 255, 0.05);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        background-color: var(--bg);
        color: var(--text-main);
        display: flex;
        height: 100vh;
        overflow: hidden;
      }

      /* Sidebar Styles */
      aside {
        width: 300px;
        background-color: var(--sidebar-bg);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        padding: 20px;
      }

      .logo {
        font-weight: 700;
        font-size: 1.5rem;
        margin-bottom: 2rem;
        background: linear-gradient(90deg, #818cf8, #c084fc);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .auth-section {
        margin-bottom: 2rem;
        padding: 1rem;
        background: var(--glass);
        border-radius: 12px;
        border: 1px solid var(--border);
      }

      .auth-section input {
        width: 100%;
        padding: 0.5rem;
        background: #0f172a;
        border: 1px solid var(--border);
        border-radius: 6px;
        color: white;
        font-size: 0.8rem;
        margin-bottom: 0.5rem;
      }

      .project-list-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
      }

      .project-list {
        flex: 1;
        overflow-y: auto;
      }

      .project-item {
        padding: 12px;
        background: var(--glass);
        border-radius: 8px;
        margin-bottom: 8px;
        cursor: pointer;
        border: 1px solid transparent;
        transition: all 0.2s ease;
      }

      .project-item:hover {
        border-color: var(--primary);
        background: rgba(99, 102, 241, 0.1);
      }

      .project-item.active {
        border-color: var(--primary);
        background: var(--primary);
      }

      /* Main Content Styles */
      main {
        flex: 1;
        padding: 2rem;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 2rem;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      button {
        padding: 10px 18px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-weight: 500;
        transition: all 0.2s;
      }

      .btn-primary {
        background-color: var(--primary);
        color: white;
      }

      .btn-primary:hover {
        background-color: var(--primary-hover);
        transform: translateY(-1px);
      }

      .btn-outline {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-main);
      }

      .btn-danger {
        background-color: var(--danger);
        color: white;
      }

      .card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 1.5rem;
        position: relative;
      }

      .prompt-grid {
        display: grid;
        gap: 1rem;
      }

      .prompt-card {
        background: var(--glass);
        padding: 1rem;
        border-radius: 12px;
        border: 1px solid var(--border);
      }

      .prompt-text {
        color: var(--text-main);
        margin-bottom: 0.5rem;
        font-weight: 500;
      }

      .ai-response {
        color: var(--text-dim);
        font-size: 0.9rem;
        font-style: italic;
      }

      .form-group {
        margin-bottom: 1rem;
      }

      label {
        display: block;
        margin-bottom: 0.5rem;
        color: var(--text-dim);
        font-size: 0.85rem;
      }

      input,
      textarea {
        width: 100%;
        padding: 12px;
        background: #0f172a;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: white;
        outline: none;
      }

      input:focus,
      textarea:focus {
        border-color: var(--primary);
      }

      /* Animations */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .fade-in {
        animation: fadeIn 0.3s ease forwards;
      }
    </style>
  </head>
  <body>
    <aside>
      <div class="logo">NoCode Backend</div>

      <div class="auth-section">
        <label>API Token (JWT)</label>
        <input type="password" id="token" placeholder="Paste your token here" />
        <p style="font-size: 0.7rem; color: var(--text-dim)">
          Required for all requests
        </p>
      </div>

      <div class="project-list-header">
        <h3>Projects</h3>
        <button
          class="btn-outline"
          style="padding: 5px 10px"
          onclick="fetchProjects()"
        >
          Refresh
        </button>
      </div>

      <div class="project-list" id="projectList">
        <!-- Projects will appear here -->
      </div>

      <button
        class="btn-primary"
        style="margin-top: 1rem"
        onclick="showProjectForm()"
      >
        + New Project
      </button>
    </aside>

    <main id="mainContent">
      <div id="welcomeScreen" class="header fade-in">
        <h1>Welcome to Dashboard</h1>
        <p style="color: var(--text-dim)">
          Select or create a project to manage prompts.
        </p>
      </div>

      <!-- Project Form (Initially Hidden) -->
      <section id="projectForm" class="card fade-in" style="display: none">
        <h2 id="formTitle">Create New Project</h2>
        <div class="form-group">
          <label>Project Name</label>
          <input type="text" id="projectName" placeholder="E-commerce App" />
        </div>
        <div class="form-group">
          <label>Initial Prompt</label>
          <textarea
            id="projectPrompt"
            rows="3"
            placeholder="Create a responsive navbar..."
          ></textarea>
        </div>
        <div style="display: flex; gap: 10px">
          <button class="btn-primary" onclick="handleProjectSubmit()">
            Save Project
          </button>
          <button class="btn-outline" onclick="hideAllSections()">
            Cancel
          </button>
        </div>
      </section>

      <!-- Project Details & Prompts -->
      <section id="projectDetails" style="display: none" class="fade-in">
        <div class="header">
          <div>
            <h1 id="activeProjectName">Project Title</h1>
            <p style="color: var(--text-dim)">
              Project ID: <span id="activeProjectId"></span>
            </p>
          </div>
          <div style="display: flex; gap: 10px">
            <button class="btn-outline" onclick="editProject()">
              Edit Name
            </button>
            <button class="btn-danger" onclick="deleteProject()">Delete</button>
          </div>
        </div>

        <div class="card" style="margin-top: 2rem">
          <div class="header" style="margin-bottom: 1.5rem">
            <h3>Prompts History</h3>
            <button class="btn-primary" onclick="showPromptForm()">
              + Add Prompt
            </button>
          </div>

          <div id="promptsList" class="prompt-grid">
            <!-- Prompts will appear here -->
          </div>
        </div>
      </section>

      <!-- Prompt Form -->
      <section id="promptForm" class="card fade-in" style="display: none">
        <h2>Add Prompt to Project</h2>
        <div class="form-group">
          <label>Prompt Description</label>
          <textarea id="promptText" rows="4"></textarea>
        </div>
        <div class="form-group">
          <label>AI Response (Simulated)</label>
          <textarea id="aiResponse" rows="2">
Code generated successfully...</textarea
          >
        </div>
        <div style="display: flex; gap: 10px">
          <button class="btn-primary" onclick="handlePromptSubmit()">
            Submit Prompt
          </button>
          <button
            class="btn-outline"
            onclick="showProjectDetails(currentProjectId)"
          >
            Cancel
          </button>
        </div>
      </section>
    </main>

    <script>
      const API_URL = "/api";
      let currentProjectId = null;
      let editingProjectId = null;

      function getHeaders() {
        const token = document.getElementById("token").value;
        return {
          "Content-Type": "application/json",
          Authorization: `Bearer ${token}`,
        };
      }

      async function fetchProjects() {
        try {
          const response = await fetch(`${API_URL}/projects`, {
            headers: getHeaders(),
          });
          const data = await response.json();
          if (data.status === "success") {
            renderProjectList(data.data);
          } else {
            alert("Error: " + data.message);
          }
        } catch (err) {
          alert("Connection error");
        }
      }

      function renderProjectList(projects) {
        const list = document.getElementById("projectList");
        list.innerHTML = projects
          .map(
            (p) => `
                <div class="project-item ${currentProjectId === p.id ? "active" : ""}" onclick="showProjectDetails(${p.id})">
                    <div style="font-weight: 600;">${p.project_name}</div>
                    <div style="font-size: 0.7rem; color: var(--text-dim); margin-top: 4px;">
                        Created: ${new Date(p.created_at).toLocaleDateString()}
                    </div>
                </div>
            `,
          )
          .join("");
      }

      async function showProjectDetails(id) {
        currentProjectId = id;
        hideAllSections();
        document.getElementById("projectDetails").style.display = "block";

        // Highlight in sidebar
        const items = document.querySelectorAll(".project-item");
        items.forEach((it) => it.classList.remove("active"));

        // Get specific project details
        const res = await fetch(`${API_URL}/projects/${id}`, {
          headers: getHeaders(),
        });
        const data = await res.json();
        if (data.status === "success") {
          document.getElementById("activeProjectName").innerText =
            data.data.project_name;
          document.getElementById("activeProjectId").innerText = data.data.id;
        }

        // Get prompts
        fetchPrompts(id);
      }

      async function fetchPrompts(projectId) {
        const res = await fetch(`${API_URL}/prompts?project_id=${projectId}`, {
          headers: getHeaders(),
        });
        const data = await res.json();
        if (data.status === "success") {
          renderPrompts(data.data);
        }
      }

      function renderPrompts(prompts) {
        const list = document.getElementById("promptsList");
        if (prompts.length === 0) {
          list.innerHTML =
            '<p style="color: var(--text-dim);">No prompts yet.</p>';
          return;
        }
        list.innerHTML = prompts
          .map(
            (p) => `
                <div class="prompt-card">
                    <div style="display: flex; justify-content: space-between;">
                        <div class="prompt-text">${p.prompt}</div>
                        <button class="btn-danger" style="padding: 2px 8px; font-size: 10px;" onclick="deletePrompt(${p.id})">X</button>
                    </div>
                    <div class="ai-response">${p.ai_response}</div>
                    <div style="font-size: 0.6rem; color: var(--text-dim); margin-top: 10px;">${new Date(p.created_at).toLocaleString()}</div>
                </div>
            `,
          )
          .join("");
      }

      function showProjectForm() {
        hideAllSections();
        document.getElementById("projectForm").style.display = "block";
        document.getElementById("formTitle").innerText = "Create New Project";
        document.getElementById("projectName").value = "";
        document.getElementById("projectPrompt").value = "";
        editingProjectId = null;
      }

      async function handleProjectSubmit() {
        const name = document.getElementById("projectName").value;
        const prompt = document.getElementById("projectPrompt").value;

        const url = editingProjectId
          ? `${API_URL}/projects/${editingProjectId}`
          : `${API_URL}/projects`;
        const method = editingProjectId ? "PUT" : "POST";

        const payload = { project_name: name };
        if (!editingProjectId) {
          payload.user_prompt = prompt; // Only for new creation
          payload.generated_code = "// Initial setup";
        }

        const res = await fetch(url, {
          method: method,
          headers: getHeaders(),
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (data.status === "success") {
          fetchProjects();
          showProjectDetails(data.data.id);
        } else {
          alert(data.message);
        }
      }

      function showPromptForm() {
        hideAllSections();
        document.getElementById("promptForm").style.display = "block";
        document.getElementById("promptText").value = "";
      }

      async function handlePromptSubmit() {
        const text = document.getElementById("promptText").value;
        const ai = document.getElementById("aiResponse").value;

        const res = await fetch(`${API_URL}/prompts`, {
          method: "POST",
          headers: getHeaders(),
          body: JSON.stringify({
            project_id: currentProjectId,
            prompt: text,
            ai_response: ai,
          }),
        });
        const data = await res.json();
        if (data.status === "success") {
          showProjectDetails(currentProjectId);
        } else {
          alert(data.message);
        }
      }

      async function deleteProject() {
        if (!confirm("Are you sure you want to delete this project?")) return;
        const res = await fetch(`${API_URL}/projects/${currentProjectId}`, {
          method: "DELETE",
          headers: getHeaders(),
        });
        const data = await res.json();
        if (data.status === "success") {
          currentProjectId = null;
          fetchProjects();
          hideAllSections();
          document.getElementById("welcomeScreen").style.display = "block";
        }
      }

      async function deletePrompt(id) {
        if (!confirm("Delete this prompt entry?")) return;
        const res = await fetch(`${API_URL}/prompts/${id}`, {
          method: "DELETE",
          headers: getHeaders(),
        });
        const data = await res.json();
        if (data.status === "success") {
          fetchPrompts(currentProjectId);
        }
      }

      function editProject() {
        const currentName =
          document.getElementById("activeProjectName").innerText;
        editingProjectId = currentProjectId;
        hideAllSections();
        document.getElementById("projectForm").style.display = "block";
        document.getElementById("formTitle").innerText = "Edit Project Name";
        document.getElementById("projectName").value = currentName;
        document.getElementById("projectPrompt").parentElement.style.display =
          "none"; // Hide prompt field for edit
      }

      function hideAllSections() {
        [
          "welcomeScreen",
          "projectForm",
          "projectDetails",
          "promptForm",
        ].forEach((id) => {
          document.getElementById(id).style.display = "none";
        });
        // Show prompt field again in case it was hidden for edit
        document.getElementById("projectPrompt").parentElement.style.display =
          "block";
      }

      // Initialize
      window.onload = () => {
        // If token is in localStorage, auto-fill it
        const savedToken = localStorage.getItem("api_token");
        if (savedToken) document.getElementById("token").value = savedToken;
      };

      document.getElementById("token").onchange = (e) => {
        localStorage.setItem("api_token", e.target.value);
      };
    </script>
  </body>
</html>
